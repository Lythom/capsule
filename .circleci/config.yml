version: 2.1

jobs:
  build:
    docker:
      - image: cimg/openjdk:21.0.8

    working_directory: ~/repo

    environment:
      JVM_OPTS: -Xmx3200m
      TERM: dumb

    steps:
      - checkout

      - restore_cache:
          keys:
            - v3-dependencies-{{ checksum "build.gradle" }}
            - v3-dependencies-

      - run: echo 'export GRADLE_OPTS="-Dfile.encoding=UTF-8"' >> $BASH_ENV
      - run: rm -rf build/libs
      - run: chmod +x ./gradlew
      - run: sed -i "s/BUILD_ID/${CIRCLE_BUILD_NUM}/g" build.gradle
      - run: ./gradlew build --stacktrace --info

      - save_cache:
          paths:
            - ~/.gradle
          key: v3-dependencies-{{ checksum "build.gradle" }}

      - store_artifacts:
          path: build/libs
          destination: jars

workflows:
  version: 2
  build_and_test:
    jobs:
      - build
