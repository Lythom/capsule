version: 2.1

jobs:
  build:
    docker:
      - image: cimg/openjdk:21.0.8
    resource_class: large

    working_directory: ~/repo

    environment:
      JVM_OPTS: -Xmx3200m
      TERM: dumb

    steps:
      - checkout

      - restore_cache:
          keys:
            - v3-dependencies-{{ checksum "build.gradle" }}
            - v3-dependencies-

      - run: echo 'export GRADLE_OPTS="-Dfile.encoding=UTF-8"' >> $BASH_ENV
      - run: rm -rf build/libs
      - run: chmod +x ./gradlew
      - run: sed -i "s/BUILD_ID/${CIRCLE_BUILD_NUM}/g" build.gradle
      - run: ./gradlew build --stacktrace --info

      - save_cache:
          paths:
            - ~/.gradle
          key: v3-dependencies-{{ checksum "build.gradle" }}

      - store_artifacts:
          path: build/libs
          destination: jars

      - persist_to_workspace:
          root: .
          paths:
            - build/libs
            - publish.sh
            - CHANGELOG.md

  publish:
    docker:
      - image: cimg/python:3.12

    working_directory: ~/repo

    steps:
      - attach_workspace:
          at: .

      - run:
          name: Publish to CurseForge and Modrinth
          command: |
            JAR_FILE=$(find build/libs -name "Capsule-*.jar" ! -name "*-sources.jar" | head -1)
            if [ -z "$JAR_FILE" ]; then
              echo "ERROR: No jar found in build/libs/"
              exit 1
            fi
            echo "Publishing: $JAR_FILE"
            chmod +x ./publish.sh
            ./publish.sh "$JAR_FILE" "${RELEASE_TYPE:-beta}"

workflows:
  version: 2
  build_and_publish:
    jobs:
      - build
      - hold:
          type: approval
          requires:
            - build
      - publish:
          requires:
            - hold
